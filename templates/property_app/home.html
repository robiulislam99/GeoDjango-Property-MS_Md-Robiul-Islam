{% extends "base.html" %}
{% block title %}StayFinder — Find Your Perfect Vacation Rental{% endblock %}
{% block content %}
<section class="hero">
    <div class="container">
        <h1>Find your perfect vacation rental</h1>
        <p>Search over 1,000 properties worldwide</p>
        <form class="hero-search" action="{% url 'property_search' %}" method="get">
            <div class="autocomplete-wrapper">
                <input type="text" id="hero-input" name="location"
                       placeholder="Where are you going? e.g. Destin, Florida" autocomplete="off" required>
                <div class="autocomplete-results" id="hero-autocomplete"></div>
            </div>
            <button type="submit">Search</button>
        </form>
    </div>
</section>

{% block extra_js %}
<script>
(function() {
    const input = document.getElementById('hero-input');
    const box = document.getElementById('hero-autocomplete');
    let timer;
    input.addEventListener('input', () => {
        clearTimeout(timer);
        box.innerHTML = '';
        const q = input.value.trim();
        if (q.length < 2) return;
        timer = setTimeout(() => {
            fetch(`/api/locations/autocomplete/?q=${encodeURIComponent(q)}`)
                .then(r => r.json())
                .then(data => {
                    box.innerHTML = '';
                    data.results.forEach(loc => {
                        const d = document.createElement('div');
                        d.className = 'autocomplete-item';
                        d.textContent = loc.label;
                        d.onclick = () => { input.value = loc.label; box.innerHTML = ''; };
                        box.appendChild(d);
                    });
                });
        }, 300);
    });
    document.addEventListener('click', e => {
        if (!e.target.closest('.hero-search')) box.innerHTML = '';
    });
})();
</script>
{% endblock %}
{% endblock %}
