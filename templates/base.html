{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StayFinder{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="site-header">
    <div class="container header-inner">
        <a href="{% url 'home' %}" class="logo">StayFinder</a>
        <form class="header-search" action="{% url 'property_search' %}" method="get">
            <div class="autocomplete-wrapper">
                <input type="text" name="location" placeholder="Search destination..." autocomplete="off"
                       value="{% block header_search_value %}{% endblock %}">
                <div class="autocomplete-results" id="header-autocomplete"></div>
            </div>
            <button type="submit">Search</button>
        </form>
    </div>
</header>

{% block content %}{% endblock %}

<footer class="site-footer">
    <div class="container">
        <p>&copy; 2026 StayFinder. All rights reserved.</p>
    </div>
</footer>

<script>
// Autocomplete for header search
(function() {
    const input = document.querySelector('.header-search input[name="location"]');
    const box = document.getElementById('header-autocomplete');
    if (!input || !box) return;
    let timer;
    input.addEventListener('input', () => {
        clearTimeout(timer);
        box.innerHTML = '';
        const q = input.value.trim();
        if (q.length < 2) return;
        timer = setTimeout(() => {
            fetch(`/api/locations/autocomplete/?q=${encodeURIComponent(q)}`)
                .then(r => r.json())
                .then(data => {
                    box.innerHTML = '';
                    data.results.forEach(loc => {
                        const d = document.createElement('div');
                        d.className = 'autocomplete-item';
                        d.textContent = loc.label;
                        d.onclick = () => { input.value = loc.label; box.innerHTML = ''; };
                        box.appendChild(d);
                    });
                });
        }, 300);
    });
    document.addEventListener('click', e => {
        if (!e.target.closest('.header-search')) box.innerHTML = '';
    });
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
